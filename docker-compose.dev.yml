# ============================================================================
# Guardian — local development with hot reload
#   1. Create your dev env file:  cp .env.example .env.dev   (use a DEV token!)
#   2. Start:                     docker compose -f docker-compose.dev.yml up --build
#
# Your local ./src is bind-mounted into the container, and nodemon restarts the
# bot automatically whenever you save a file — mirroring the panel environment
# while you edit code locally.
# ============================================================================

services:
  guardian-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: guardian-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      - NODE_ENV=development
      - DEBUG=true
    ports:
      - "3000:3000"
    volumes:
      # Live-mount source so edits on the host are seen inside the container.
      - ./src:/app/src
      - ./package.json:/app/package.json
      # Keep dev data (SQLite) across restarts.
      - guardian-dev-data:/app/data
    command: npm run dev

volumes:
  guardian-dev-data:
